<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wardrobe Roulette</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="wheel-page">

  <div class="container">

    <div class="wheel-info">
      <h1>Wardrobe Roulette</h1>
      <p class="subtitle">Press Spin to get your budget!</p>
    </div>
    
    <div class="wheel-container">
      <div class="spinBtn" id="spinBtn">Spin</div>

      <div class="wheel" id="wheel">
        <div class="number" style="--i:1; --clr:#22404D;"><span>70</span></div>
        
        <div class="number" style="--i:2; --clr:#E1CD26;"><span>220</span></div>
        
        <div class="number" style="--i:3; --clr:#285F74;"><span>90</span></div>
        
        <div class="number" style="--i:4; --clr:#7DBA3F;"><span>180</span></div>
        
        <div class="number" style="--i:5; --clr:#00763d;"><span>120</span></div>
        
        <div class="number" style="--i:6; --clr:#EAEAEA;"><span style="color: #22404D;">150</span></div>
      </div>
    </div>

    <p id="budgetDisplay" class="budget-text"></p>
    <button id="startGameBtn" class="start-btn" style="display:none;" onclick="startGame()">Start Choosing Outfit</button>

  </div>

  <script src="game.js"></script>
</body>
</html>
